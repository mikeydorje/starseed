<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spectrum</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23222'/%3E%3Cg stroke='%23333' stroke-width='1.2' stroke-linecap='round'%3E%3Cline x1='16' y1='2' x2='16' y2='10'/%3E%3Cline x1='16' y1='22' x2='16' y2='30'/%3E%3Cline x1='2' y1='16' x2='10' y2='16'/%3E%3Cline x1='22' y1='16' x2='30' y2='16'/%3E%3Cline x1='6.1' y1='6.1' x2='11.8' y2='11.8'/%3E%3Cline x1='20.2' y1='20.2' x2='25.9' y2='25.9'/%3E%3Cline x1='25.9' y1='6.1' x2='20.2' y2='11.8'/%3E%3Cline x1='11.8' y1='20.2' x2='6.1' y2='25.9'/%3E%3C/g%3E%3C/svg%3E" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}body{background:#060810;overflow:hidden}canvas{display:block}
    #controls{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;color:#ccc;background:rgba(6,8,16,0.88);backdrop-filter:blur(12px);padding:24px 20px;overflow-y:auto;transition:opacity 0.4s}
    #controls h2{font-size:15px;letter-spacing:3px;background:linear-gradient(90deg,#50b4dc,#80d0e0,#50a0c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:16px;font-weight:700}
    #controls.hidden{opacity:0;pointer-events:none;transition:opacity 0.6s ease}
    #controls.visible{opacity:1!important;pointer-events:auto!important}
    .controls-inner{width:100%;max-width:320px;text-align:center}
    .scene-symbol{font-size:48px;line-height:1;margin-bottom:8px;background:linear-gradient(90deg,#50b4dc,#80d0e0,#50a0c0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    #file-input{display:none}.upload-btn{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:18px;width:100%;padding:12px 0;font-family:inherit;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#50b4dc;background:linear-gradient(135deg,rgba(80,180,220,0.2),rgba(128,208,224,0.12));border:1px solid rgba(80,180,220,0.25);border-radius:10px;cursor:pointer;transition:all 0.3s ease}.upload-btn:hover{background:linear-gradient(135deg,rgba(80,180,220,0.35),rgba(128,208,224,0.25));border-color:rgba(80,180,220,0.5);box-shadow:0 0 20px rgba(80,180,220,0.2);color:#fff}.upload-btn svg{width:16px;height:16px}
    #audio-ready{text-align:center}.audio-filename{display:block;color:rgba(255,255,255,0.5);font-size:11px;margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;margin-left:auto;margin-right:auto}.play-btn{background:rgba(80,200,80,0.25);color:rgba(80,200,80,0.9);border:1px solid rgba(80,200,80,0.3);width:100%;padding:10px 0;border-radius:10px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;transition:all 0.3s}.play-btn:hover{background:rgba(80,200,80,0.4)}.replace-btn{background:none;border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.12);cursor:pointer;font-family:inherit;font-size:10px;font-weight:400;letter-spacing:1px;text-transform:uppercase;display:block;width:100%;padding:6px 0;margin:10px auto 0;border-radius:8px;transition:all 0.3s}.replace-btn:hover{color:rgba(255,255,255,0.7);border-color:rgba(255,255,255,0.25)}
    #back-btn{position:fixed;top:16px;right:16px;z-index:20;padding:6px 14px;background:rgba(10,10,20,0.5);border:1px solid rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;color:rgba(255,255,255,0.4);font-family:inherit;font-size:11px;letter-spacing:1px;text-transform:uppercase;text-decoration:none;transition:all 0.3s;backdrop-filter:blur(6px)}#back-btn:hover{color:#fff;background:rgba(255,255,255,0.12)}
    #fs-btn{position:fixed;bottom:16px;right:16px;z-index:20;width:36px;height:36px;padding:0;background:rgba(10,10,20,0.5);border:1px solid rgba(255,255,255,0.08);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.35);transition:all 0.3s ease;backdrop-filter:blur(6px)}#fs-btn:hover{color:#fff;background:rgba(80,180,220,0.3);border-color:rgba(80,180,220,0.4)}#fs-btn svg{width:18px;height:18px}
    /* ── Diagnostic toolbar ── */
    #diag-bar{position:fixed;top:0;left:0;right:0;z-index:15;display:none;align-items:center;gap:16px;padding:8px 16px;background:rgba(6,8,16,0.82);backdrop-filter:blur(8px);border-bottom:1px solid rgba(80,180,220,0.12);font-family:'Segoe UI',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);flex-wrap:wrap}
    #diag-bar.active{display:flex}
    #diag-bar label{display:flex;align-items:center;gap:6px;white-space:nowrap}
    #diag-bar .diag-name{color:rgba(80,180,220,0.7);font-weight:600;letter-spacing:0.5px;text-transform:uppercase;font-size:10px}
    #diag-bar input[type=range]{-webkit-appearance:none;appearance:none;width:100px;height:3px;border-radius:2px;background:rgba(80,180,220,0.15);outline:none}
    #diag-bar input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,#50b4dc,#80d0e0);cursor:pointer;box-shadow:0 0 6px rgba(80,180,220,0.4)}
    #diag-bar select{background:rgba(20,24,40,0.8);color:rgba(255,255,255,0.6);border:1px solid rgba(80,180,220,0.2);border-radius:4px;padding:2px 6px;font-family:inherit;font-size:11px;cursor:pointer;outline:none}
    #diag-bar select:focus{border-color:rgba(80,180,220,0.5)}
    #diag-bar .diag-val{color:rgba(80,180,220,0.5);font-variant-numeric:tabular-nums;min-width:28px;text-align:right;font-size:10px}
    #diag-bar button{background:none;border:1px solid rgba(80,180,220,0.2);color:rgba(80,180,220,0.6);border-radius:4px;padding:3px 10px;font-family:inherit;font-size:10px;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;transition:all 0.2s}
    #diag-bar button:hover{color:#fff;border-color:rgba(80,180,220,0.5);background:rgba(80,180,220,0.15)}
    #diag-bar button.active{color:#50b4dc;border-color:#50b4dc;background:rgba(80,180,220,0.2)}
    #diag-bar .sep{width:1px;height:20px;background:rgba(80,180,220,0.1);flex-shrink:0}
    @media(max-width:700px){#diag-bar{font-size:10px;gap:10px;padding:6px 10px}#diag-bar input[type=range]{width:70px}}
  </style>
</head>
<body>
  <div id="controls">
    <div class="controls-inner">
    <div class="scene-symbol">⏛</div>
    <h2>SPECTRUM</h2>
    <input type="file" id="file-input" accept=".mp3,.wav,.m4a,.aac,.ogg,.flac,.webm,audio/mpeg,audio/wav,audio/mp4,audio/aac,audio/ogg,audio/flac,audio/webm" />
    <div id="upload-area" style="display:none"><label class="upload-btn" for="file-input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>Upload Audio</label></div>
    <div id="audio-loader" style="text-align:center;margin-top:18px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.25)">Loading audio…</div>
    <div id="audio-ready" style="display:none"><span id="audio-name" class="audio-filename"></span><button id="play-btn" class="play-btn">▶︎ Play</button><button id="replace-btn" class="replace-btn">Replace Audio</button></div>
    </div>
  </div>

  <!-- Diagnostic toolbar — shown during playback/listening -->
  <div id="diag-bar">
    <label><span class="diag-name">Threshold</span><input type="range" id="d-threshold" min="0" max="100" value="50" /><span class="diag-val" id="d-threshold-val">50</span></label>
    <div class="sep"></div>
    <label><span class="diag-name">Smoothing</span><input type="range" id="d-smoothing" min="0" max="99" value="85" /><span class="diag-val" id="d-smoothing-val">0.85</span></label>
    <div class="sep"></div>
    <label><span class="diag-name">FFT</span><select id="d-fft"><option value="128">128</option><option value="256">256</option><option value="512">512</option><option value="1024">1024</option><option value="2048">2048</option></select></label>
    <div class="sep"></div>
    <label><span class="diag-name">Gain</span><input type="range" id="d-gain" min="0" max="200" value="100" /><span class="diag-val" id="d-gain-val">1.0×</span></label>
    <div class="sep"></div>
    <button id="d-log">Log Freq</button>
    <div class="sep"></div>
    <button id="d-solo">Band Solo</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="audio-store.js"></script>
  <script src="spectrum.js"></script>
  <script src="mic-input.js"></script>
  <script src="tracker.js"></script>
  <a id="back-btn" href="./#spectrum" onclick="if(window.SCENE&&window.SCENE.stopFileAudio)window.SCENE.stopFileAudio()">← Scenes</a>
  <button id="fs-btn" title="Toggle fullscreen"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg></button>
  <script>const fsBtn=document.getElementById('fs-btn');fsBtn.addEventListener('click',()=>{if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen();});document.addEventListener('fullscreenchange',()=>{fsBtn.innerHTML=document.fullscreenElement?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 14h6v6M20 14h-6v6M14 4v6h6M10 4v6H4"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>';});</script>
</body>
</html>
