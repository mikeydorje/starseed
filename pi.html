<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>π</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='2.5' fill='%23222'/%3E%3Cg stroke='%23333' stroke-width='1.2' stroke-linecap='round'%3E%3Cline x1='16' y1='2' x2='16' y2='10'/%3E%3Cline x1='16' y1='22' x2='16' y2='30'/%3E%3Cline x1='2' y1='16' x2='10' y2='16'/%3E%3Cline x1='22' y1='16' x2='30' y2='16'/%3E%3Cline x1='6.1' y1='6.1' x2='11.8' y2='11.8'/%3E%3Cline x1='20.2' y1='20.2' x2='25.9' y2='25.9'/%3E%3Cline x1='25.9' y1='6.1' x2='20.2' y2='11.8'/%3E%3Cline x1='11.8' y1='20.2' x2='6.1' y2='25.9'/%3E%3C/g%3E%3C/svg%3E" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #040410; min-height: 100vh; min-height: 100dvh; }
    canvas { display: block; }
    #controls { position: fixed; inset: 0; z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; color: #ccc; background: rgba(8, 6, 20, 0.82); backdrop-filter: blur(10px); padding: 24px 20px; overflow-y: auto; transition: opacity 0.4s }
    #controls.locked { pointer-events: none; opacity: 0.35; }
    #controls h2 {
      font-size: 15px; letter-spacing: 3px;
      color: #b0a8d8; margin-bottom: 16px; font-weight: 400;
      font-style: italic;
    }
    .param { margin-bottom: 14px; }
    .param label {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 13px; margin-bottom: 5px;
    }
    .param label span.name { color: #9088c0; font-weight: 600; }
    .param label span.val { color: #555; font-size: 11px; font-variant-numeric: tabular-nums; }
    .param input[type=range] {
      -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
      border-radius: 2px; background: rgba(255,255,255,0.06); outline: none;
    }
    .param input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: #7060b0; cursor: pointer;
      box-shadow: 0 0 6px rgba(112,96,176,0.4);
    }
    #file-input { display: none; }
    .upload-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 18px; width: 100%; padding: 12px 0;
      font-family: inherit; font-size: 13px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: #b0a8d8; background: linear-gradient(135deg, rgba(112,96,176,0.25), rgba(80,64,140,0.12));
      border: 1px solid rgba(112,96,176,0.3); border-radius: 10px;
      cursor: pointer; transition: all 0.3s ease;
    }
    .upload-btn:hover {
      background: linear-gradient(135deg, rgba(112,96,176,0.4), rgba(80,64,140,0.25));
      border-color: rgba(112,96,176,0.55); box-shadow: 0 0 16px rgba(112,96,176,0.2);
      color: #fff;
    }
    .upload-btn svg { width: 16px; height: 16px; }
    .param .desc {
      font-size: 10px; color: #555; margin-bottom: 4px; line-height: 1.3;
      font-style: italic;
    }
    #controls.hidden { opacity: 0; pointer-events: none; transition: opacity 0.6s ease }
    #fs-btn {
      position: fixed; bottom: 16px; right: 16px; z-index: 20;
      width: 36px; height: 36px; padding: 0;
      background: rgba(8, 6, 20, 0.5); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.35); transition: all 0.3s ease;
      backdrop-filter: blur(6px);
    }
    #fs-btn:hover:hover { color: #fff; background: rgba(112,96,176,0.3); border-color: rgba(112,96,176,0.4); }
    #fs-btn svg svg { width: 18px; height: 18px; }
    #audio-ready { text-align: center; }
    .audio-filename { display: block; color: rgba(255,255,255,0.5); font-size: 11px; margin-bottom: 8px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; margin-left: auto; margin-right: auto; }
    .play-btn { background: rgba(80,200,80,0.25); color: rgba(80,200,80,0.9); border: 1px solid rgba(80,200,80,0.3); width: 100%; padding: 10px 0; border-radius: 10px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; }
    .play-btn:hover { background: rgba(80,200,80,0.4); }
    .replace-btn { background: none; border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.12); cursor: pointer; font-family: inherit; font-size: 10px; font-weight: 400; letter-spacing: 1px; text-transform: uppercase; display: block; width: 100%; padding: 6px 0; margin: 10px auto 0; border-radius: 8px; transition: all 0.3s; }
    .replace-btn:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }
    #back-btn { position: fixed; top: 16px; right: 16px; z-index: 20; padding: 6px 14px; background: rgba(10,10,20,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; color: rgba(255,255,255,0.4); font-family: inherit; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; transition: all 0.3s; backdrop-filter: blur(6px); }
    #back-btn:hover { color: #fff; background: rgba(255,255,255,0.12); }
    #controls.visible { opacity: 1 !important; pointer-events: auto !important }
    .controls-inner { width: 100%; max-width: 320px; text-align: center; }
    .scene-symbol { font-size: 48px; line-height: 1; margin-bottom: 8px; color: #b0a8d8; }
    #controls .param { display: none; }
    #controls #randomize-btn { display: none !important; }
    @media (max-width: 400px) {
      .controls-inner { max-width: 280px; }
    }
    #randomize-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; padding: 8px 0; margin-bottom: 16px;
      font-family: inherit; font-size: 11px; font-weight: 500;
      letter-spacing: 1px; text-transform: uppercase;
      color: rgba(255,255,255,0.35); background: none;
      border: 1px solid rgba(255,255,255,0.06); border-radius: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    #randomize-btn:hover {
      color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
    }
    #randomize-btn svg { width: 14px; height: 14px; }
  </style>
</head>
<body>
  <div id="controls">
    <div class="controls-inner">
    <div class="scene-symbol">π</div>
    <h2>Pi</h2>

    <div class="param">
      <label><span class="name">○ Convergence</span><span class="val" id="p1-val">50</span></label>
      <div class="desc">Inscribed polygon sides</div>
      <input type="range" id="p1" min="0" max="100" value="50" />
    </div>

    <div class="param">
      <label><span class="name">✿︎ Harmonic</span><span class="val" id="p2-val">40</span></label>
      <div class="desc">Rose curve petals</div>
      <input type="range" id="p2" min="0" max="100" value="40" />
    </div>

    <div class="param">
      <label><span class="name">Σ Series</span><span class="val" id="p3-val">50</span></label>
      <div class="desc">Leibniz series</div>
      <input type="range" id="p3" min="0" max="100" value="50" />
    </div>

    <div class="param">
      <label><span class="name">ℯ Euler</span><span class="val" id="p4-val">45</span></label>
      <div class="desc">Phase rotation</div>
      <input type="range" id="p4" min="0" max="100" value="45" />
    </div>

    <div class="param">
      <label><span class="name">∞ Irrational</span><span class="val" id="p5-val">50</span></label>
      <div class="desc">Color phase</div>
      <input type="range" id="p5" min="0" max="100" value="50" />
    </div>

    <div class="param">
      <label><span class="name">⊘ Threshold</span><span class="val" id="p7-val">50</span></label>
      <div class="desc">Silence gate</div>
      <input type="range" id="p7" min="0" max="100" value="50" />
    </div>

    <div class="param">
      <label><span class="name">↭ Flux</span><span class="val" id="p8-val">45</span></label>
      <div class="desc">Parameter drift</div>
      <input type="range" id="p8" min="0" max="100" value="45" />
    </div>

    <div class="param">
      <label><span class="name">⧗ Epoch</span><span class="val" id="p6-val">55</span></label>
      <div class="desc">Narrative arc · not in listen mode</div>
      <input type="range" id="p6" min="0" max="100" value="55" />
    </div>

    <button id="randomize-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>Randomize</button>
    <input type="file" id="file-input" accept=".mp3,.wav,.m4a,.aac,.ogg,.flac,.webm,audio/mpeg,audio/wav,audio/mp4,audio/aac,audio/ogg,audio/flac,audio/webm" />
    <div id="upload-area" style="display:none">
      <label class="upload-btn" for="file-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Audio
      </label>
    </div>
    <div id="audio-loader" style="text-align:center;margin-top:18px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.25)">Loading audio…</div>
    <div id="audio-ready" style="display:none">
      <span id="audio-name" class="audio-filename"></span>
      <button id="play-btn" class="play-btn">▶︎ Play</button>
      <button id="replace-btn" class="replace-btn">Replace Audio</button>
    </div>
    </div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="audio-store.js"></script>
  <script src="pi.js"></script>
  <script src="recorder.js"></script>
  <script src="info-box.js"></script>
  <script src="mic-input.js"></script>
  <a id="back-btn" href="./" onclick="if(window.SCENE&&window.SCENE.stopFileAudio)window.SCENE.stopFileAudio();sessionStorage.setItem('starseed-scroll','pi')">← Scenes</a>
  <button id="fs-btn" title="Toggle fullscreen">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
    </svg>
  </button>
  <script>
    const fsBtn = document.getElementById('fs-btn');
    fsBtn.addEventListener('click', () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      else document.exitFullscreen();
    });
    document.addEventListener('fullscreenchange', () => {
      fsBtn.innerHTML = document.fullscreenElement
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 14h6v6M20 14h-6v6M14 4v6h6M10 4v6H4"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>';
    });
  </script>
</body>
</html>
