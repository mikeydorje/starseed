<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scenes</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050508;
      color: #ccc;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #444;
      margin-bottom: 48px;
    }
    .scenes {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .scene-card {
      width: 220px;
      padding: 32px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.02);
      text-align: center;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s;
    }
    .scene-card:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-4px);
    }
    .scene-card .icon {
      font-size: 36px;
      margin-bottom: 16px;
      display: block;
    }
    .scene-card .name {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .scene-card .desc {
      font-size: 11px;
      color: #555;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>select scene</h1>

  <button id="reset-hints" style="display:none;margin:48px auto 0;padding:6px 16px;font-family:inherit;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.25);background:none;border:1px solid rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;transition:all 0.3s" onmouseover="this.style.color='rgba(255,255,255,0.6)';this.style.borderColor='rgba(255,255,255,0.15)'" onmouseout="this.style.color='rgba(255,255,255,0.25)';this.style.borderColor='rgba(255,255,255,0.06)'">Reset Info Popups</button>
  <button id="clear-cache" style="display:block;margin:12px auto 32px;padding:6px 16px;font-family:inherit;font-size:11px;letter-spacing:1px;color:rgba(255,255,255,0.25);background:none;border:1px solid rgba(255,255,255,0.06);border-radius:8px;cursor:pointer;transition:all 0.3s" onmouseover="this.style.color='rgba(255,255,255,0.6)';this.style.borderColor='rgba(255,255,255,0.15)'" onmouseout="this.style.color='rgba(255,255,255,0.25)';this.style.borderColor='rgba(255,255,255,0.06)'">Clear Cache</button>
  <script src="audio-store.js"></script>
  <script>
  (function(){
    var HINT_KEYS=['audio-vis-info-dismissed'];
    var btn=document.getElementById('reset-hints');
    function hasStored(){return HINT_KEYS.some(function(k){return localStorage.getItem(k)==='1';})}
    if(hasStored())btn.style.display='block';
    btn.addEventListener('click',function(){
      HINT_KEYS.forEach(function(k){localStorage.removeItem(k);});
      btn.style.display='none';
    });
    document.getElementById('clear-cache').addEventListener('click',function(){
      AudioStore.clear().catch(function(){});
      HINT_KEYS.forEach(function(k){localStorage.removeItem(k);});
      if('caches'in window){caches.keys().then(function(ks){ks.forEach(function(k){caches.delete(k);});});}
      location.reload(true);
    });
  })();
  </script>
</body>
</html>
